name: owj_assistant
description: "أوج - مساعدك الذكي بالعربي المصري"
publish_to: 'none'
version: 2.3.0+6

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.4+1

  # Environment & Config
  flutter_dotenv: ^5.2.1

  # HTTP client
  dio: ^5.7.0

  # Local storage
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5

  # UUID generation
  uuid: ^4.5.1

  # Voice
  flutter_tts: ^4.2.2
  record: ^5.1.2
  audioplayers: ^6.1.0
  permission_handler: ^11.3.1

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # Device control
  url_launcher: ^6.3.1
  android_intent_plus: ^5.0.2
  vibration: ^2.0.0
  network_info_plus: ^6.0.2
  battery_plus: ^6.2.1
  device_info_plus: ^11.2.0
  wakelock_plus: ^1.2.8
  share_plus: ^10.1.4
  package_info_plus: ^8.1.3

  # Crypto
  crypto: ^3.0.6

  # State
  provider: ^6.1.2

  # Audio
  just_audio: ^0.9.42

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
  # Note: .env file is optional for local dev (create from .env.example).
  # For Codemagic builds, API keys are injected via --dart-define flags
  # which are baked into the binary at compile time (more reliable).
  # The .env asset is a backup source for flutter_dotenv.
