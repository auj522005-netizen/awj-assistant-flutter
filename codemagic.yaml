workflows:
  android-release:
    name: OWJ Assistant Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      android_signing:
        - upload_keystore
      groups:
        - owj_api_keys
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Set up local properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"
      - name: Prepare signing config
        script: |
          if [ -n "$CM_KEYSTORE" ]; then
            echo "storePassword=$CM_KEYSTORE_PASSWORD" > "$CM_BUILD_DIR/android/key.properties"
            echo "keyPassword=$CM_KEY_ALIAS_PASSWORD" >> "$CM_BUILD_DIR/android/key.properties"
            echo "keyAlias=$CM_KEY_ALIAS" >> "$CM_BUILD_DIR/android/key.properties"
            echo "storeFile=$CM_KEYSTORE_PATH" >> "$CM_BUILD_DIR/android/key.properties"
          fi
      - name: Inject API keys into .env (backup for dotenv)
        script: |
          cat > "$CM_BUILD_DIR/.env" << ENVEOF
          GEMINI_API_KEY=${GEMINI_API_KEY:-}
          GROQ_API_KEY=${GROQ_API_KEY:-}
          CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}
          OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
          OPENAI_API_KEY=${OPENAI_API_KEY:-}
          BIGMODEL_API_KEY=${BIGMODEL_API_KEY:-}
          MEM0_API_KEY=${MEM0_API_KEY:-}
          TAVILY_API_KEY=${TAVILY_API_KEY:-}
          TAVILY_MCP_KEY=${TAVILY_MCP_KEY:-}
          ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
          GITHUB_TOKEN=${GITHUB_TOKEN:-}
          NOTION_TOKEN=${NOTION_TOKEN:-}
          YOUTUBE_API_KEY=${YOUTUBE_API_KEY:-}
          GMAIL_CLIENT_ID=${GMAIL_CLIENT_ID:-}
          GMAIL_CLIENT_SECRET=${GMAIL_CLIENT_SECRET:-}
          FIREBASE_API_KEY=${FIREBASE_API_KEY:-}
          FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-}
          FIREBASE_APP_ID=${FIREBASE_APP_ID:-}
          ENVEOF
          # Remove any leading/trailing whitespace from keys
          sed -i 's/^[[:space:]]*//' "$CM_BUILD_DIR/.env"
          # Verify .env was created with actual values
          echo "📋 .env file created. Checking first key..."
          head -1 "$CM_BUILD_DIR/.env" | cut -c1-30
      - name: Clean Flutter build cache
        script: |
          flutter clean
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Verify version and build info
        script: |
          echo "📦 Building OWJ Assistant v2.3.0+6"
          echo "🔑 Checking API keys availability..."
          for key in GEMINI_API_KEY GROQ_API_KEY BIGMODEL_API_KEY OPENROUTER_API_KEY CEREBRAS_API_KEY; do
            if [ -n "${!key}" ]; then
              echo "  ✅ $key: set (${#!key} chars)"
            else
              echo "  ❌ $key: NOT SET"
            fi
          done
      - name: Build APK with API keys via dart-define
        script: |
          flutter build apk --release \
            --dart-define=GEMINI_API_KEY="${GEMINI_API_KEY:-}" \
            --dart-define=GROQ_API_KEY="${GROQ_API_KEY:-}" \
            --dart-define=CEREBRAS_API_KEY="${CEREBRAS_API_KEY:-}" \
            --dart-define=OPENROUTER_API_KEY="${OPENROUTER_API_KEY:-}" \
            --dart-define=OPENAI_API_KEY="${OPENAI_API_KEY:-}" \
            --dart-define=BIGMODEL_API_KEY="${BIGMODEL_API_KEY:-}" \
            --dart-define=MEM0_API_KEY="${MEM0_API_KEY:-}" \
            --dart-define=TAVILY_API_KEY="${TAVILY_API_KEY:-}" \
            --dart-define=TAVILY_MCP_KEY="${TAVILY_MCP_KEY:-}" \
            --dart-define=ELEVENLABS_API_KEY="${ELEVENLABS_API_KEY:-}" \
            --dart-define=GITHUB_TOKEN="${GITHUB_TOKEN:-}" \
            --dart-define=NOTION_TOKEN="${NOTION_TOKEN:-}" \
            --dart-define=YOUTUBE_API_KEY="${YOUTUBE_API_KEY:-}" \
            --dart-define=GMAIL_CLIENT_ID="${GMAIL_CLIENT_ID:-}" \
            --dart-define=GMAIL_CLIENT_SECRET="${GMAIL_CLIENT_SECRET:-}" \
            --dart-define=FIREBASE_API_KEY="${FIREBASE_API_KEY:-}" \
            --dart-define=FIREBASE_PROJECT_ID="${FIREBASE_PROJECT_ID:-}" \
            --dart-define=FIREBASE_APP_ID="${FIREBASE_APP_ID:-}"
          echo "✅ APK built successfully!"
          ls -lh "$CM_BUILD_DIR/build/app/outputs/flutter-apk/"*.apk
      - name: Build AAB with API keys via dart-define
        script: |
          flutter build appbundle --release \
            --dart-define=GEMINI_API_KEY="${GEMINI_API_KEY:-}" \
            --dart-define=GROQ_API_KEY="${GROQ_API_KEY:-}" \
            --dart-define=CEREBRAS_API_KEY="${CEREBRAS_API_KEY:-}" \
            --dart-define=OPENROUTER_API_KEY="${OPENROUTER_API_KEY:-}" \
            --dart-define=OPENAI_API_KEY="${OPENAI_API_KEY:-}" \
            --dart-define=BIGMODEL_API_KEY="${BIGMODEL_API_KEY:-}" \
            --dart-define=MEM0_API_KEY="${MEM0_API_KEY:-}" \
            --dart-define=TAVILY_API_KEY="${TAVILY_API_KEY:-}" \
            --dart-define=TAVILY_MCP_KEY="${TAVILY_MCP_KEY:-}" \
            --dart-define=ELEVENLABS_API_KEY="${ELEVENLABS_API_KEY:-}" \
            --dart-define=GITHUB_TOKEN="${GITHUB_TOKEN:-}" \
            --dart-define=NOTION_TOKEN="${NOTION_TOKEN:-}" \
            --dart-define=YOUTUBE_API_KEY="${YOUTUBE_API_KEY:-}" \
            --dart-define=GMAIL_CLIENT_ID="${GMAIL_CLIENT_ID:-}" \
            --dart-define=GMAIL_CLIENT_SECRET="${GMAIL_CLIENT_SECRET:-}" \
            --dart-define=FIREBASE_API_KEY="${FIREBASE_API_KEY:-}" \
            --dart-define=FIREBASE_PROJECT_ID="${FIREBASE_PROJECT_ID:-}" \
            --dart-define=FIREBASE_APP_ID="${FIREBASE_APP_ID:-}"
          echo "✅ AAB built successfully!"
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
    publishing:
      email:
        recipients:
          - mohannadcontento@gmail.com
        notify:
          success: true
          failure: true
